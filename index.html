<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>動作環境チェック</title>
<style>
  :root {
    --ok: #1a7f37; --ok-bg: #e6f4ea;
    --warn: #9a6700; --warn-bg: #fff8e1;
    --ng: #b42318; --ng-bg: #fdecea;
    --muted: #667085;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
    background: #f4f5f7;
    color: #1f2328;
    line-height: 1.6;
  }
  main { max-width: 640px; margin: 0 auto; padding: 24px 16px 48px; }
  h1 { font-size: 20px; margin: 8px 0 16px; }
  .banner {
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
    background: #eef1f4;
    border: 1px solid #d0d7de;
  }
  .banner strong { display: block; font-size: 17px; margin-bottom: 4px; }
  .banner p { margin: 0; font-size: 14px; }
  .banner.ok   { background: var(--ok-bg);   border-color: var(--ok);   }
  .banner.ok strong   { color: var(--ok); }
  .banner.warn { background: var(--warn-bg); border-color: var(--warn); }
  .banner.warn strong { color: var(--warn); }
  .banner.ng   { background: var(--ng-bg);   border-color: var(--ng);   }
  .banner.ng strong   { color: var(--ng); }
  .card {
    background: #fff;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    padding: 16px;
  }
  .card h2 { font-size: 15px; margin: 0 0 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #eaecef; vertical-align: top; }
  th { width: 9em; color: var(--muted); font-weight: 600; white-space: nowrap; }
  tr:last-child th, tr:last-child td { border-bottom: none; }
  td.ua { word-break: break-all; font-size: 12px; color: var(--muted); }
  .actions { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
  button {
    font: inherit;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    border: 1px solid #1f6feb;
    background: #1f6feb;
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: #175cd3; }
  #copy-done { font-size: 13px; color: var(--ok); visibility: hidden; }
  .note { margin-top: 16px; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>動作環境チェック</h1>

  <div id="verdict" class="banner">
    <strong>確認しています…</strong>
    <p>お使いの環境を判定しています。</p>
  </div>

  <div class="card">
    <h2>お使いの環境</h2>
    <table id="env-table"><tbody></tbody></table>
    <div class="actions">
      <button id="copy-btn" type="button">この内容をコピー</button>
      <span id="copy-done">コピーしました</span>
    </div>
  </div>

  <p class="note">
    お問い合わせの際は「この内容をコピー」を押して、コピーされた内容をメールやフォームに貼り付けてお送りください。
    このページはお使いのブラウザの情報を表示するだけで、サーバーへの送信・保存は行いません。
  </p>
</main>
<script src="app.js"></script>
</body>
</html>
