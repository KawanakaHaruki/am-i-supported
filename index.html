<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>動作環境チェック</title>
<style>
  /* UNIVERSE GROUP(unv.group)のブランドトーンに合わせる:
     白ベース・黒・ゴールド(#7b6234)、角丸なし、游ゴシック+英字はRoboto Condensed */
  :root {
    --gold: #7b6234;
    --ok: #1a7f37; --ok-bg: #f3f9f5;
    --warn: #9a6700; --warn-bg: #fcf8ed;
    --ng: #b42318; --ng-bg: #fbf1f0;
    --muted: #666;
    --line: #dcdcdc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Yu Gothic Medium", "游ゴシック Medium", YuGothic, "Yu Gothic", "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
    background: #fff;
    color: #000;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  main { max-width: 640px; margin: 0 auto; padding: 40px 16px 64px; }
  h1 { font-size: 22px; letter-spacing: 0.15em; margin: 4px 0 0; }
  h1::after {
    content: "";
    display: block;
    width: 40px;
    border-bottom: 2px solid var(--gold);
    margin-top: 14px;
  }
  .banner {
    padding: 20px;
    margin: 28px 0 24px;
    background: #f7f7f7;
    border: 1px solid var(--line);
  }
  .banner strong { display: block; font-size: 17px; letter-spacing: 0.1em; margin-bottom: 4px; }
  .banner p { margin: 0; font-size: 14px; }
  .banner.ok   { background: var(--ok-bg);   border-color: var(--ok);   }
  .banner.ok strong   { color: var(--ok); }
  .banner.warn { background: var(--warn-bg); border-color: var(--warn); }
  .banner.warn strong { color: var(--warn); }
  .banner.ng   { background: var(--ng-bg);   border-color: var(--ng);   }
  .banner.ng strong   { color: var(--ng); }
  .card {
    background: #fff;
    border: 1px solid var(--line);
    padding: 24px 20px;
  }
  .card h2 {
    font-size: 15px;
    letter-spacing: 0.15em;
    margin: 0 0 16px;
    padding-left: 10px;
    border-left: 3px solid var(--gold);
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 4px; border-bottom: 1px solid #ececec; vertical-align: top; }
  th { width: 9em; color: var(--muted); font-weight: 600; white-space: nowrap; }
  tr:last-child th, tr:last-child td { border-bottom: none; }
  td.ua { word-break: break-all; font-size: 12px; color: var(--muted); }
  .actions { margin-top: 20px; display: flex; align-items: center; gap: 12px; }
  button {
    font: inherit;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0.1em;
    padding: 14px 36px;
    border-radius: 0;
    border: 1px solid #000;
    background: #000;
    color: #fff;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
  }
  button:hover { background: var(--gold); border-color: var(--gold); }
  #copy-done { font-size: 13px; color: var(--ok); visibility: hidden; }
  .note { margin-top: 20px; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<main>
  <h1>動作環境チェック</h1>

  <div id="verdict" class="banner">
    <strong>確認しています…</strong>
    <p>お使いの環境を判定しています。</p>
  </div>

  <div class="card">
    <h2>お使いの環境</h2>
    <table id="env-table"><tbody></tbody></table>
    <div class="actions">
      <button id="copy-btn" type="button">この内容をコピー</button>
      <span id="copy-done">コピーしました</span>
    </div>
  </div>

  <p class="note">
    お問い合わせの際は「この内容をコピー」を押して、コピーされた内容をメールやフォームに貼り付けてお送りください。
    このページはお使いのブラウザの情報を表示するだけで、サーバーへの送信・保存は行いません。
  </p>
</main>
<script src="app.js"></script>
</body>
</html>
