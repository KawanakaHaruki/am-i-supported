name: Deploy to GitHub Pages

# versions.json はリポジトリに置かず、デプロイのたびに生成して成果物にだけ含める。
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC にバージョン情報を更新して再デプロイ
  workflow_dispatch: # 手動更新

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Generate versions.json
        run: node scripts/update-versions.mjs
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html app.js versions.json _site/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
